name: Deploy Supply Chain API

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

env:
  PROJECT_ID: solutionchallenge-494200
  REGION: asia-south1
  SERVICE: supply-chain-api
  IMAGE: asia-south1-docker.pkg.dev/solutionchallenge-494200/supply-chain-images/supply-chain-api

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: supply-chain-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & push image via Cloud Build
        run: |
          gcloud builds submit backend/ \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --project ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --allow-unauthenticated \
            --service-account supply-chain-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars "GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_REGION=${{ env.REGION }},MODEL_SERVER_URL=${{ secrets.MODEL_SERVER_URL }},GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" \
            --project ${{ env.PROJECT_ID }}

      - name: Verify deployment health
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)' \
            --project ${{ env.PROJECT_ID }})
          echo "Deployed to: $URL"
          curl -f "$URL/api/monitoring/health" || exit 1
